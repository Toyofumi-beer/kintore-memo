<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>筋トレログ</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card2: #22262f;
    --text: #e8eaed;
    --sub: #9aa0a8;
    --accent: #4f8ef7;
    --accent2: #34c77b;
    --danger: #e05555;
    --border: #2c313b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    padding: calc(14px + env(safe-area-inset-top)) 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--card);
    border-radius: 10px;
    padding: 4px;
  }
  .tabs button {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--sub);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 6px;
    border-radius: 8px;
  }
  .tabs button.active { background: var(--accent); color: #fff; }
  main { padding: 4px 16px 40px; max-width: 560px; margin: 0 auto; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .card h2 { font-size: 13px; color: var(--sub); font-weight: 600; margin-bottom: 10px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  input, select, textarea {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    padding: 10px 12px;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  label { font-size: 11px; color: var(--sub); display: block; margin-bottom: 4px; }
  .set-row {
    display: grid;
    grid-template-columns: 24px 1fr 1fr 72px 28px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .set-num { color: var(--sub); font-size: 13px; text-align: center; }
  .set-rm { font-size: 12px; color: var(--accent2); text-align: right; white-space: nowrap; }
  .del-set {
    border: none; background: none; color: var(--sub);
    font-size: 18px; line-height: 1; padding: 4px;
  }
  .btn {
    display: block; width: 100%;
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700;
    padding: 13px; margin-top: 10px;
    color: #fff; background: var(--card2);
    border: 1px solid var(--border);
  }
  .btn.primary { background: var(--accent); border-color: var(--accent); }
  .btn.green { background: var(--accent2); border-color: var(--accent2); }
  .btn:active { opacity: .8; }
  .best {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 10px;
  }
  .best .val { font-size: 28px; font-weight: 800; color: var(--accent2); }
  .best .diff { font-size: 13px; color: var(--sub); }
  table.rm {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  table.rm td {
    padding: 5px 4px; border-bottom: 1px solid var(--border);
    color: var(--sub);
  }
  table.rm td:last-child { text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }
  .hist-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
  }
  .hist-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .hist-date { font-weight: 700; font-size: 14px; }
  .hist-rm { color: var(--accent2); font-weight: 700; font-size: 14px; }
  .hist-sets { color: var(--sub); font-size: 13px; line-height: 1.6; }
  .hist-del { border: none; background: none; color: var(--danger); font-size: 12px; padding: 6px 0 0; }
  .empty { color: var(--sub); text-align: center; padding: 30px 0; font-size: 14px; }
  .prog-select { display: flex; gap: 8px; margin-bottom: 12px; }
  .prog-select button {
    flex: 1; border: 1px solid var(--border); background: var(--card2);
    color: var(--sub); font-size: 13px; font-weight: 700; padding: 10px 4px;
    border-radius: 10px;
  }
  .prog-select button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .prog-desc { font-size: 12px; color: var(--sub); line-height: 1.6; margin-bottom: 4px; }
  .rm-input-row { display: flex; align-items: flex-end; gap: 8px; }
  .rm-input-row > div { flex: 1; }
  .rm-input-row button {
    border: 1px solid var(--border); background: var(--card2); color: var(--text);
    font-size: 12px; font-weight: 600; padding: 10px 12px; border-radius: 10px; white-space: nowrap;
  }
  .week-block { margin-bottom: 14px; }
  .week-title {
    font-size: 13px; font-weight: 700; color: var(--accent);
    margin: 4px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }
  table.prog { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.prog th {
    text-align: left; color: var(--sub); font-size: 11px; font-weight: 600;
    padding: 4px 4px; border-bottom: 1px solid var(--border);
  }
  table.prog th:not(:first-child), table.prog td:not(:first-child) { text-align: center; }
  table.prog td {
    padding: 7px 4px; border-bottom: 1px solid var(--border);
    color: var(--text); font-variant-numeric: tabular-nums;
  }
  table.prog td.day { color: var(--sub); font-weight: 600; white-space: nowrap; }
  table.prog td.wt { color: var(--accent2); font-weight: 700; }
  .prog-note { font-size: 11px; color: var(--sub); margin-top: 8px; line-height: 1.6; }
  table.prog td.load { text-align: right; padding-right: 0; }
  .load-btn {
    border: 1px solid var(--accent); background: transparent; color: var(--accent);
    font-size: 11px; font-weight: 700; padding: 5px 8px; border-radius: 8px; white-space: nowrap;
  }
  .load-btn:active { background: var(--accent); color: #fff; }
  .cycle-target { text-align: center; padding: 6px 0 2px; }
  .cycle-target .wt { font-size: 30px; font-weight: 800; color: var(--accent2); }
  .cycle-target .sub { font-size: 14px; color: var(--sub); margin-left: 6px; }
  .cycle-ctl { display: flex; gap: 8px; margin: 12px 0 4px; }
  .cycle-ctl button {
    flex: 1; border: 1px solid var(--border); background: var(--card2); color: var(--text);
    font-size: 14px; font-weight: 700; padding: 11px 4px; border-radius: 10px;
  }
  .rep-tabs { display: flex; gap: 8px; margin-top: 10px; }
  .rep-tabs button {
    flex: 1; border: 1px solid var(--border); background: var(--card2); color: var(--sub);
    font-size: 14px; font-weight: 700; padding: 10px 4px; border-radius: 10px;
  }
  .rep-tabs button.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .phase-list { font-size: 12px; color: var(--sub); line-height: 1.9; }
  .phase-list b { color: var(--text); }
  .toast {
    position: fixed; left: 50%; bottom: 40px;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent2); color: #fff;
    padding: 10px 20px; border-radius: 20px;
    font-size: 14px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: all .25s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .hidden { display: none; }
</style>
</head>
<body>
<header>
  <h1>筋トレ<span>ログ</span></h1>
  <nav class="tabs">
    <button id="tabRecord" class="active">記録</button>
    <button id="tabHistory">履歴</button>
    <button id="tabProgram">プログラム</button>
  </nav>
</header>

<main>
  <!-- 記録タブ -->
  <section id="viewRecord">
    <div class="card">
      <div class="row">
        <div style="flex:1">
          <label>日付</label>
          <input type="date" id="date">
        </div>
        <div style="flex:1.4">
          <label>種目</label>
          <input type="text" id="exercise" value="ベンチプレス" list="exList">
          <datalist id="exList">
            <option value="ベンチプレス"><option value="スクワット">
            <option value="デッドリフト"><option value="ショルダープレス">
          </datalist>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>セット（重量 kg × 回数）</h2>
      <div id="sets"></div>
      <button class="btn" id="addSet">＋ セット追加</button>
    </div>

    <div class="card" id="rmCard">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h2 style="margin-bottom:0">推定1RM</h2>
        <select id="formula" style="width:auto;font-size:13px;padding:6px 26px 6px 10px;background-image:url(&quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%239aa0a8' stroke-width='1.5' fill='none'/></svg>&quot;);background-repeat:no-repeat;background-position:right 9px center">
          <option value="oconner">O'Conner式</option>
          <option value="epley">Epley式</option>
          <option value="brzycki">Brzycki式</option>
        </select>
      </div>
      <div class="best">
        <span class="val" id="bestRM">–</span>
        <span class="diff" id="rmDiff"></span>
      </div>
      <table class="rm" id="rmTable"></table>
    </div>

    <div class="card">
      <h2>メモ（任意）</h2>
      <textarea id="memo" rows="2" placeholder="調子、フォームの気づきなど"></textarea>
    </div>

    <button class="btn primary" id="save">この内容で保存</button>
    <button class="btn green" id="copy">📋 AI報告用テキストをコピー</button>
  </section>

  <!-- 履歴タブ -->
  <section id="viewHistory" class="hidden">
    <div id="histList"></div>
  </section>

  <!-- プログラムタブ -->
  <section id="viewProgram" class="hidden">
    <div class="card">
      <h2>基準にする1RM</h2>
      <div class="rm-input-row">
        <div>
          <label>1RM（kg）</label>
          <input inputmode="decimal" id="progRM" placeholder="例: 100">
        </div>
        <button id="fillRM">履歴から取得</button>
      </div>
    </div>

    <div class="card">
      <h2>プログラムを選ぶ</h2>
      <div class="prog-select" id="progSelect"></div>
      <div class="prog-desc" id="progDesc"></div>
    </div>

    <div id="progOutput"></div>

    <button class="btn green" id="copyProg">📋 プログラムをコピー（AI相談用）</button>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
const KEY = "kintore-sessions-v1";
const $ = id => document.getElementById(id);

let sets = [{ w: "", r: "" }];

// ---------- storage ----------
const load = () => JSON.parse(localStorage.getItem(KEY) || "[]");
const store = s => localStorage.setItem(KEY, JSON.stringify(s));

// ---------- RM ----------
const FORMULAS = {
  oconner: { name: "O'Conner", up: (w, r) => w * (1 + r / 40), down: (rm, n) => rm / (1 + n / 40) },
  epley:   { name: "Epley",    up: (w, r) => w * (1 + r / 30), down: (rm, n) => rm / (1 + n / 30) },
  brzycki: { name: "Brzycki",  up: (w, r) => r < 37 ? w * 36 / (37 - r) : null, down: (rm, n) => rm * (37 - n) / 36 }
};
const FKEY = "kintore-formula";
function formula() { return FORMULAS[localStorage.getItem(FKEY)] || FORMULAS.oconner; }
function e1rm(w, r) {
  w = parseFloat(w); r = parseInt(r);
  if (!w || !r) return null;
  return r === 1 ? w : formula().up(w, r);
}
function fmt(n) { return (Math.round(n * 10) / 10).toFixed(1); }
function bestOf(session) {
  let best = null;
  for (const s of session.sets) {
    const v = e1rm(s.w, s.r);
    if (v !== null && (best === null || v > best)) best = v;
  }
  return best;
}

// ---------- sets UI ----------
function renderSets() {
  const box = $("sets");
  box.innerHTML = "";
  sets.forEach((s, i) => {
    const row = document.createElement("div");
    row.className = "set-row";
    const rm = e1rm(s.w, s.r);
    row.innerHTML = `
      <div class="set-num">${i + 1}</div>
      <input inputmode="decimal" placeholder="kg" value="${s.w}" data-i="${i}" data-k="w">
      <input inputmode="numeric" placeholder="回" value="${s.r}" data-i="${i}" data-k="r">
      <div class="set-rm">${rm ? fmt(rm) + "kg" : ""}</div>
      <button class="del-set" data-del="${i}">×</button>`;
    box.appendChild(row);
  });
  box.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", e => {
      sets[e.target.dataset.i][e.target.dataset.k] = e.target.value;
      updateRM();
      e.target.closest(".set-row").querySelector(".set-rm").textContent =
        (() => { const s = sets[e.target.dataset.i]; const v = e1rm(s.w, s.r); return v ? fmt(v) + "kg" : ""; })();
    });
  });
  box.querySelectorAll("[data-del]").forEach(el => {
    el.addEventListener("click", e => {
      sets.splice(e.target.dataset.del, 1);
      if (!sets.length) sets = [{ w: "", r: "" }];
      renderSets(); updateRM();
    });
  });
}

// ---------- RM card ----------
function prevBest(exercise, beforeDate) {
  const hist = load()
    .filter(s => s.exercise === exercise && s.date < beforeDate)
    .sort((a, b) => b.date.localeCompare(a.date));
  return hist.length ? bestOf(hist[0]) : null;
}
function updateRM() {
  const best = bestOf({ sets });
  $("bestRM").textContent = best ? fmt(best) + " kg" : "–";
  const table = $("rmTable");
  table.innerHTML = "";
  const diffEl = $("rmDiff");
  diffEl.textContent = "";
  if (!best) return;
  const prev = prevBest($("exercise").value.trim(), $("date").value);
  if (prev) {
    const d = best - prev;
    diffEl.textContent = `前回 ${fmt(prev)}kg（${d >= 0 ? "+" : ""}${fmt(d)}kg）`;
    diffEl.style.color = d >= 0 ? "var(--accent2)" : "var(--danger)";
  }
  for (const n of [1, 2, 3, 5, 8, 10]) {
    const v = n === 1 ? best : formula().down(best, n);
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${n}RM 換算</td><td>${fmt(v)} kg</td>`;
    table.appendChild(tr);
  }
}

// ---------- save ----------
function currentSession() {
  return {
    id: Date.now(),
    date: $("date").value,
    exercise: $("exercise").value.trim() || "ベンチプレス",
    sets: sets.filter(s => parseFloat(s.w) && parseInt(s.r)),
    memo: $("memo").value.trim()
  };
}
$("save").addEventListener("click", () => {
  const s = currentSession();
  if (!s.sets.length) return toast("セットを入力してください");
  const all = load();
  all.push(s);
  store(all);
  toast("保存しました 💪");
  renderHistory();
});

// ---------- report ----------
function buildReport() {
  const s = currentSession();
  if (!s.sets.length) return null;
  const best = bestOf(s);
  const lines = [];
  lines.push(`【筋トレ報告】${s.date} ${s.exercise}`);
  lines.push("");
  lines.push("■ 本日のセット");
  s.sets.forEach((x, i) => {
    const v = e1rm(x.w, x.r);
    lines.push(`${i + 1}. ${x.w}kg × ${x.r}回（e1RM ${fmt(v)}kg）`);
  });
  lines.push("");
  lines.push(`■ 本日ベスト推定1RM: ${fmt(best)}kg（${formula().name}式）`);
  const prev = prevBest(s.exercise, s.date);
  if (prev !== null) {
    const d = best - prev;
    lines.push(`前回比: ${d >= 0 ? "+" : ""}${fmt(d)}kg`);
  }
  const hist = load()
    .filter(x => x.exercise === s.exercise && x.date < s.date)
    .sort((a, b) => b.date.localeCompare(a.date))
    .slice(0, 5);
  if (hist.length) {
    lines.push("");
    lines.push("■ 直近の推移（推定1RM）");
    hist.reverse().forEach(h => lines.push(`${h.date}: ${fmt(bestOf(h))}kg`));
  }
  if (s.memo) {
    lines.push("");
    lines.push(`■ メモ: ${s.memo}`);
  }
  lines.push("");
  lines.push("この記録を踏まえて、次回のトレーニング（重量・回数・セット数）のアドバイスをください。");
  return lines.join("\n");
}
$("copy").addEventListener("click", async () => {
  const text = buildReport();
  if (!text) return toast("セットを入力してください");
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
  }
  toast("コピーしました 📋 AIに貼り付けてください");
});

// ---------- history ----------
function renderHistory() {
  const box = $("histList");
  const all = load().sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  if (!all.length) {
    box.innerHTML = `<div class="empty">まだ記録がありません</div>`;
    return;
  }
  box.innerHTML = "";
  all.forEach(s => {
    const div = document.createElement("div");
    div.className = "hist-item";
    const setsTxt = s.sets.map(x => `${x.w}kg×${x.r}`).join("、");
    div.innerHTML = `
      <div class="hist-head">
        <span class="hist-date">${s.date}　${s.exercise}</span>
        <span class="hist-rm">e1RM ${fmt(bestOf(s))}kg</span>
      </div>
      <div class="hist-sets">${setsTxt}${s.memo ? "<br>📝 " + s.memo : ""}</div>
      <button class="hist-del" data-id="${s.id}">削除</button>`;
    box.appendChild(div);
  });
  box.querySelectorAll(".hist-del").forEach(el => {
    el.addEventListener("click", e => {
      if (!confirm("この記録を削除しますか？")) return;
      store(load().filter(x => x.id !== Number(e.target.dataset.id)));
      renderHistory(); updateRM();
    });
  });
}

// ---------- misc ----------
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove("show"), 2200);
}
$("addSet").addEventListener("click", () => {
  const last = sets[sets.length - 1];
  sets.push({ w: last ? last.w : "", r: last ? last.r : "" });
  renderSets(); updateRM();
});
const TABS = { Record: "viewRecord", History: "viewHistory", Program: "viewProgram" };
function switchTab(name) {
  for (const [k, view] of Object.entries(TABS)) {
    const on = k === name;
    $(view).classList.toggle("hidden", !on);
    $("tab" + k).classList.toggle("active", on);
  }
  if (name === "Program") initProgramRM();
}
$("tabRecord").addEventListener("click", () => switchTab("Record"));
$("tabHistory").addEventListener("click", () => switchTab("History"));
$("tabProgram").addEventListener("click", () => switchTab("Program"));
$("date").addEventListener("change", updateRM);
$("exercise").addEventListener("input", updateRM);
$("formula").value = localStorage.getItem(FKEY) in FORMULAS ? localStorage.getItem(FKEY) : "oconner";
$("formula").addEventListener("change", e => {
  localStorage.setItem(FKEY, e.target.value);
  renderSets(); updateRM();
});

// ---------- programs ----------
const roundKg = x => Math.round(x / 2.5) * 2.5;

const PROGRAMS = {
  smolovjr: {
    name: "Smolov Jr.",
    desc: "3週間×週4日。高頻度・高ボリュームでベンチMAXを短期的に伸ばす専門プログラム。週2は+2.5kg、週3は+5kgで全セッションの重量を上げます。3週終了後は1週デロード＆測定を推奨。",
    build(rm) {
      const base = [
        { day: "Day 1", pct: 70, sets: 6, reps: 6 },
        { day: "Day 2", pct: 75, sets: 7, reps: 5 },
        { day: "Day 3", pct: 80, sets: 8, reps: 4 },
        { day: "Day 4", pct: 85, sets: 10, reps: 3 }
      ];
      const adds = [0, 2.5, 5];
      return adds.map((add, wi) => ({
        title: `第${wi + 1}週${add ? `（週1 +${add}kg）` : ""}`,
        rows: base.map(b => ({
          day: b.day, sets: b.sets, reps: b.reps, pct: b.pct,
          weight: roundKg(rm * b.pct / 100) + add
        }))
      }));
    }
  },
  hps: {
    name: "HPS",
    desc: "6週間×週3日。H(筋肥大)・P(パワー)・S(筋力)の3種の刺激を1週間の中で回す構成。フロリダ州立大の研究がベースで、平均+7〜10%のMAX向上が狙い。S日は「限界まで（AMRAP）」の全力セット。順番はH→P→Sを守るのが重要。",
    build(rm) {
      const pParams = w => w <= 2 ? { pct: 80, sets: 5 } : w <= 4 ? { pct: 85, sets: 4 } : { pct: 90, sets: 5 };
      const sPct = w => [85, 87.5, 90, 90, 92.5, 95][w - 1];
      const weeks = [];
      for (let w = 1; w <= 6; w++) {
        const p = pParams(w);
        weeks.push({
          title: `第${w}週`,
          rows: [
            { day: "H 筋肥大", sets: 5, reps: 8, pct: 75, weight: roundKg(rm * 0.75) },
            { day: "P パワー", sets: p.sets, reps: 1, pct: p.pct, weight: roundKg(rm * p.pct / 100) },
            { day: "S 筋力", sets: 3, reps: "限界", pct: sPct(w), weight: roundKg(rm * sPct(w) / 100) }
          ]
        });
      }
      return weeks;
    }
  },
  t1085: {
    name: "10/8/5",
    cycle: true,
    desc: "週3回以上・週15セットが目安。同じレップ数で5セットを回し、全セット成功したら次回+2.5kg。そのレップ数を維持できなくなったら 10→8→5 と1段階下げて継続。9割以上がMAX更新した王道の漸進プログラム。",
    startWeight(rm) { return Math.max(20, roundKg(rm * 0.70) - 10); }
  }
};

const T1085KEY = "kintore-1085-state";
function get1085(rm) {
  let st = null;
  try { st = JSON.parse(localStorage.getItem(T1085KEY)); } catch {}
  if (!st || typeof st.weight !== "number") st = { weight: PROGRAMS.t1085.startWeight(rm || 100), reps: 10 };
  return st;
}
function set1085(st) { localStorage.setItem(T1085KEY, JSON.stringify(st)); }

let curProg = "smolovjr";

function latestBenchRM() {
  const hist = load()
    .filter(s => s.exercise === "ベンチプレス")
    .sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  return hist.length ? bestOf(hist[0]) : null;
}
function initProgramRM() {
  if (!$("progRM").value) {
    const rm = latestBenchRM();
    if (rm) $("progRM").value = fmt(rm);
  }
  renderProgSelect();
  renderProgram();
}
function renderProgSelect() {
  const box = $("progSelect");
  box.innerHTML = "";
  for (const [key, p] of Object.entries(PROGRAMS)) {
    const b = document.createElement("button");
    b.textContent = p.name;
    b.className = key === curProg ? "active" : "";
    b.addEventListener("click", () => { curProg = key; renderProgSelect(); renderProgram(); });
    box.appendChild(b);
  }
  $("progDesc").textContent = PROGRAMS[curProg].desc;
}
function loadIntoRecord(weight, reps, setCount, label) {
  $("date").value = new Date().toLocaleDateString("sv-SE");
  $("exercise").value = "ベンチプレス";
  const r = reps === "限界" || reps === "" ? "" : String(reps);
  sets = [];
  for (let i = 0; i < setCount; i++) sets.push({ w: String(weight), r });
  $("memo").value = "📋 " + label;
  renderSets();
  updateRM();
  switchTab("Record");
  window.scrollTo(0, 0);
  toast("記録に取り込みました。実績に直して保存を💪");
}

function renderProgram() {
  const out = $("progOutput");
  const rm = parseFloat($("progRM").value);
  $("copyProg").style.display = "";
  if (!rm) {
    out.innerHTML = `<div class="empty">基準1RMを入力してください</div>`;
    return;
  }
  if (PROGRAMS[curProg].cycle) return renderCycle(rm);
  const p = PROGRAMS[curProg];
  const weeks = p.build(rm);
  out.innerHTML = "";
  weeks.forEach(wk => {
    const card = document.createElement("div");
    card.className = "card week-block";
    const table = document.createElement("table");
    table.className = "prog";
    table.innerHTML = `<tr><th>日</th><th>強度</th><th>セット×回</th><th>重量</th><th></th></tr>`;
    wk.rows.forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="day">${r.day}</td>
        <td>${r.pct}%</td>
        <td>${r.sets}×${r.reps}</td>
        <td class="wt">${fmt(r.weight)}kg</td>
        <td class="load"><button class="load-btn">取込</button></td>`;
      tr.querySelector(".load-btn").addEventListener("click", () =>
        loadIntoRecord(r.weight, r.reps, r.sets, `${p.name} ${wk.title} ${r.day}（${r.pct}%）`));
      table.appendChild(tr);
    });
    card.innerHTML = `<div class="week-title">${wk.title}</div>`;
    card.appendChild(table);
    out.appendChild(card);
  });
  const note = document.createElement("div");
  note.className = "prog-note";
  note.textContent = "※「取込」でその日のメニューを記録タブに読み込めます。実際の回数に直してから保存してください。重量は2.5kg刻みで丸めています。";
  out.appendChild(note);
}

function renderCycle(rm) {
  const out = $("progOutput");
  const p = PROGRAMS[curProg];
  const st = get1085(rm);
  const start = p.startWeight(rm);
  out.innerHTML = "";

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h2>今日のターゲット</h2>
    <div class="cycle-target">
      <span class="wt">${fmt(st.weight)}kg</span>
      <span class="sub">× ${st.reps}回 × 5セット</span>
    </div>
    <div class="cycle-ctl">
      <button id="wDown">− 2.5kg</button>
      <button id="wUp">＋ 2.5kg</button>
    </div>
    <div class="rep-tabs">
      <button data-r="10" class="${st.reps === 10 ? "active" : ""}">10回</button>
      <button data-r="8" class="${st.reps === 8 ? "active" : ""}">8回</button>
      <button data-r="5" class="${st.reps === 5 ? "active" : ""}">5回</button>
    </div>`;
  out.appendChild(card);

  const btn = document.createElement("button");
  btn.className = "btn primary";
  btn.textContent = "▶ この内容を記録に取り込む";
  btn.style.marginBottom = "14px";
  btn.addEventListener("click", () =>
    loadIntoRecord(st.weight, st.reps, 5, `10/8/5 ${st.weight}kg×${st.reps}回`));
  out.appendChild(btn);

  const guide = document.createElement("div");
  guide.className = "card";
  guide.innerHTML = `
    <h2>進め方</h2>
    <div class="phase-list">
      推奨スタート重量: <b>${fmt(start)}kg</b>（10回5セットがギリギリの重量−10kgの目安）<br>
      ① <b>10回×5セット</b> 全セット成功 → 次回 <b>+2.5kg</b><br>
      ② 10回を維持できなくなったら <b>8回×5セット</b> に移行して継続<br>
      ③ さらに詰まったら <b>5回×5セット</b> に移行<br>
      頻度は週3回以上・週15セットが目安です。
    </div>`;
  out.appendChild(guide);

  card.querySelector("#wDown").addEventListener("click", () => {
    st.weight = Math.max(20, st.weight - 2.5); set1085(st); renderCycle(rm);
  });
  card.querySelector("#wUp").addEventListener("click", () => {
    st.weight += 2.5; set1085(st); renderCycle(rm);
  });
  card.querySelectorAll(".rep-tabs button").forEach(b =>
    b.addEventListener("click", () => { st.reps = Number(b.dataset.r); set1085(st); renderCycle(rm); }));
}
function buildProgReport() {
  const rm = parseFloat($("progRM").value);
  if (!rm) return null;
  const p = PROGRAMS[curProg];
  const lines = [];
  lines.push(`【ベンチプレス プログラム】${p.name}`);
  lines.push(`基準1RM: ${fmt(rm)}kg`);
  lines.push("");
  if (p.cycle) {
    const st = get1085(rm);
    lines.push(`推奨スタート重量: ${fmt(p.startWeight(rm))}kg`);
    lines.push(`今日のターゲット: ${fmt(st.weight)}kg × ${st.reps}回 × 5セット`);
    lines.push("");
    lines.push(p.desc);
    lines.push("");
    lines.push("このプログラムの進め方や、私の現状に合っているか、注意点や調整案があれば教えてください。");
    const h = latestBenchRM();
    if (h) lines.push(`（参考: 直近のベンチ推定1RM ${fmt(h)}kg）`);
    return lines.join("\n");
  }
  const weeks = p.build(rm);
  weeks.forEach(wk => {
    lines.push(`■ ${wk.title}`);
    wk.rows.forEach(r => {
      lines.push(`・${r.day}: ${fmt(r.weight)}kg × ${r.reps}回 × ${r.sets}セット（${r.pct}%）`);
    });
    lines.push("");
  });
  lines.push(p.desc);
  lines.push("");
  lines.push("このプログラムの進め方や、私の現状（下記の直近記録）に合っているか、注意点や調整案があれば教えてください。");
  const hist = latestBenchRM();
  if (hist) lines.push(`（参考: 直近のベンチ推定1RM ${fmt(hist)}kg）`);
  return lines.join("\n");
}
$("progRM").addEventListener("input", renderProgram);
$("fillRM").addEventListener("click", () => {
  const rm = latestBenchRM();
  if (!rm) return toast("ベンチプレスの記録がまだありません");
  $("progRM").value = fmt(rm);
  renderProgram();
  toast("直近の推定1RMを入れました");
});
$("copyProg").addEventListener("click", async () => {
  const text = buildProgReport();
  if (!text) return toast("基準1RMを入力してください");
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); ta.remove();
  }
  toast("コピーしました 📋 AIに貼り付けてください");
});

// init
$("date").value = new Date().toLocaleDateString("sv-SE"); // YYYY-MM-DD (local)
renderSets();
updateRM();
renderHistory();
</script>
</body>
